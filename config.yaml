# =============================================================================
# LogReg1_BPD_SMOTEENN pipeline configuration
# Collects every parameter that was hardcoded in the notebook
# (LogReg1_BPD_SMOTEENN.ipynb).
# =============================================================================

seed: 67   # USED — SEED / random_state, global reproducibility

data:                # USED by data_load() in both train/ runners
  # Absolute, or relative to ml_code/. $BIPOLAR_DATA_PATH overrides this.
  path: dataset/bipolar_dataset.xlsx   # relative to ml_code/; or export BIPOLAR_DATA_PATH
  label_column: bpdp_10years          # 'bpdp_4years' or 'bpdp_10years'
  is_binary_classification: true
  nan_subject_level_threshold: 0.3    # drop a subject if >30% of its features are missing
  nan_feature_level_threshold: 0.3    # drop a feature if >30% of subjects are missing it

sampler:             # USED — smote_param feeds the 'smote_enn' strategy in BOTH runners
  method: smote_enn
  smote_param:
    sampling_strategy: 0.7
    k_neighbors: 5

threshold:           # USED — deployment threshold rule (utils/metrics.select_threshold)
  min_target_sensitivity: 0.75   # maximize specificity at/above this sensitivity, else Youden's J

# -----------------------------------------------------------------------------
# The keys below belong to sophie's original notebook flow and are NOT read by
# this package's runners (they tune HP per fold via CLI flags instead). Kept for
# provenance only -- editing them changes nothing.
# -----------------------------------------------------------------------------
_notebook_only:
  split: {test_size: 0.3}
  model: {penalty: l1, solver: saga, max_iter: 1000, class_weight: balanced, c_override: null}
  optuna: {n_trials: 100, direction: maximize, metric: accuracy, c_low: 0.0001, c_high: 10.0,
           cv_splits: 5, pruner_warmup: 3}
  cv: {n_splits: 5, n_repeats: 1}
  calibration: {method: sigmoid}
  threshold_fixed: null

evaluation:          # USED by eval/run_ci.py
  bootstrap_n: 2000     # bootstrap resamples for the AUC confidence interval
  confidence: 0.95      # (Wilson uses z=1.96; change utils/metrics.py to vary it)

output:
  dir: outputs                       # relative to py_codes/
  predictions_csv: logreg_subject_predictions.csv  # per-prediction table for paired comparison
  save_figures: true
  show_figures: false   # if true, call plt.show() (for interactive runs)

